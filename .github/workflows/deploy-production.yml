name: Deploy to Azure Production
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'
jobs:
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm --filter @voice-ai/web... build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug - Check build output
        run: |
          echo "=== Checking .next folder ==="
          ls -la apps/web/.next/ || echo "NO .next folder!"
          echo "=== Checking standalone ==="
          ls -la apps/web/.next/standalone/ || echo "NO standalone folder!"
          echo "=== Checking server.js ==="
          ls -la apps/web/.next/standalone/server.js || echo "NO server.js!"

      - name: Create deployment package
        run: |
          # Check if standalone exists
          if [ ! -f "apps/web/.next/standalone/server.js" ]; then
            echo "ERROR: standalone/server.js not found!"
            echo "Falling back to regular next start method..."
            
            mkdir -p deploy-web/apps/web
            cp -r apps/web/.next deploy-web/apps/web/.next
            cp -r apps/web/public deploy-web/apps/web/public 2>/dev/null || true
            cp apps/web/package.json deploy-web/apps/web/
            cp -r packages deploy-web/
            cp package.json deploy-web/
            cp pnpm-workspace.yaml deploy-web/
            cp pnpm-lock.yaml deploy-web/
            cp -r node_modules deploy-web/

            cat > deploy-web/server.js << 'SERVEREOF'
          const { createServer } = require('http');
          const { parse } = require('url');
          const next = require('next');
          const path = require('path');

          const dev = false;
          const hostname = '0.0.0.0';
          const port = parseInt(process.env.PORT || '8080', 10);
          const dir = path.join(__dirname, 'apps/web');

          const app = next({ dev, hostname, port, dir });
          const handle = app.getRequestHandler();

          app.prepare().then(() => {
            createServer(async (req, res) => {
              try {
                const parsedUrl = parse(req.url, true);
                await handle(req, res, parsedUrl);
              } catch (err) {
                console.error('Error occurred handling', req.url, err);
                res.statusCode = 500;
                res.end('internal server error');
              }
            }).listen(port, hostname, (err) => {
              if (err) throw err;
              console.log(`> Ready on http://${hostname}:${port}`);
            });
          });
          SERVEREOF

          else
            echo "Found standalone! Using it..."
            cp -r apps/web/.next/standalone/. deploy-web/
            mkdir -p deploy-web/.next/static
            cp -r apps/web/.next/static/. deploy-web/.next/static/
            cp -r apps/web/public deploy-web/public 2>/dev/null || true
          fi

          cd deploy-web && zip -r ../web-deploy.zip .

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create deployment package
        run: |
          mkdir -p deploy-api/apps
          cp -r apps/api deploy-api/apps/
          cp -r packages deploy-api/
          cp package.json deploy-api/
          cp pnpm-workspace.yaml deploy-api/
          cp pnpm-lock.yaml deploy-api/
          cp -r node_modules deploy-api/

          cat > deploy-api/startup.sh << 'STARTUP'
          #!/bin/bash
          cd /home/site/wwwroot/apps/api
          node_modules/.bin/tsx src/index.ts
          STARTUP
          chmod +x deploy-api/startup.sh

          cd deploy-api && zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip
