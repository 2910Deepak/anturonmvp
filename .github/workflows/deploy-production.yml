name: Deploy to Azure Production
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'
jobs:
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm --filter @voice-ai/web... build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy-web

          # Copy the entire apps/web folder (with .next inside it)
          cp -r apps/web deploy-web/

          # Copy packages (shared, database) that web depends on
          cp -r packages deploy-web/

          # Copy root workspace files
          cp package.json deploy-web/
          cp pnpm-workspace.yaml deploy-web/
          cp pnpm-lock.yaml deploy-web/

          # Copy node_modules (root level)
          cp -r node_modules deploy-web/

          # Create startup.sh at ROOT of deploy package
          cat > deploy-web/startup.sh << 'EOF'
          #!/bin/bash
          cd /home/site/wwwroot/apps/web
          node_modules/.bin/next start -p 8080
          EOF
          chmod +x deploy-web/startup.sh

          cd deploy-web && zip -r ../web-deploy.zip .

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        run: pnpm --filter @voice-ai/api... build
        continue-on-error: true

      - name: Create deployment package
        run: |
          mkdir -p deploy-api

          # Full monorepo structure
          cp -r apps/api deploy-api/apps/api 2>/dev/null; true
          mkdir -p deploy-api/apps
          cp -r apps/api deploy-api/apps/
          cp -r packages deploy-api/
          cp package.json deploy-api/
          cp pnpm-workspace.yaml deploy-api/
          cp pnpm-lock.yaml deploy-api/
          cp -r node_modules deploy-api/

          # Startup script
          cat > deploy-api/startup.sh << 'STARTUP'
          #!/bin/bash
          cd /home/site/wwwroot/apps/api
          node_modules/.bin/tsx src/index.ts
          STARTUP
          chmod +x deploy-api/startup.sh

          cd deploy-api && zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip
