name: Deploy to Azure Production
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'
jobs:
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm --filter @voice-ai/web... build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy-web

          # Copy entire apps/web WITH node_modules
          cp -r apps/web deploy-web/apps/web

          # Copy root node_modules (for shared packages)
          cp -r node_modules deploy-web/node_modules

          # Copy packages
          cp -r packages deploy-web/packages

          # Copy workspace files
          cp package.json deploy-web/
          cp pnpm-workspace.yaml deploy-web/
          cp pnpm-lock.yaml deploy-web/

          # Create server.js at ROOT that points to apps/web
          cat > deploy-web/server.js << 'SERVEREOF'
const { createServer } = require('http');
const { parse } = require('url');
const path = require('path');

process.chdir(path.join(__dirname, 'apps/web'));
const next = require('./node_modules/next');

const dev = false;
const hostname = '0.0.0.0';
const port = parseInt(process.env.PORT || '8080', 10);

const app = next({ dev, hostname, port, dir: __dirname });
const handle = app.getRequestHandler();

app.prepare().then(() => {
  createServer(async (req, res) => {
    try {
      const parsedUrl = parse(req.url, true);
      await handle(req, res, parsedUrl);
    } catch (err) {
      console.error('Error:', err);
      res.statusCode = 500;
      res.end('internal server error');
    }
  }).listen(port, hostname, (err) => {
    if (err) throw err;
    console.log(`> Ready on http://${hostname}:${port}`);
  });
});
SERVEREOF

          cd deploy-web && zip -r ../web-deploy.zip .
          echo "=== ZIP size ==="
          ls -lh ../web-deploy.zip

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create deployment package
        run: |
          mkdir -p deploy-api/apps
          cp -r apps/api deploy-api/apps/
          cp -r packages deploy-api/
          cp package.json deploy-api/
          cp pnpm-workspace.yaml deploy-api/
          cp pnpm-lock.yaml deploy-api/
          cp -r node_modules deploy-api/

          cat > deploy-api/startup.sh << 'STARTUP'
#!/bin/bash
cd /home/site/wwwroot/apps/api
node_modules/.bin/tsx src/index.ts
STARTUP
          chmod +x deploy-api/startup.sh

          cd deploy-api && zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip
