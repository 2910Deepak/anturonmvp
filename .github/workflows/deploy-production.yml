name: Deploy to Azure Production
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'
jobs:
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm --filter @voice-ai/web... build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy-web/apps/web
          mkdir -p deploy-web/node_modules

          # Copy built web app
          cp -r apps/web/.next deploy-web/apps/web/.next
          cp -r apps/web/public deploy-web/apps/web/public 2>/dev/null || true
          cp apps/web/package.json deploy-web/apps/web/package.json
          cp apps/web/next.config.js deploy-web/apps/web/next.config.js 2>/dev/null || true
          cp apps/web/next.config.ts deploy-web/apps/web/next.config.ts 2>/dev/null || true

          # Copy web node_modules (has next inside)
          cp -r apps/web/node_modules deploy-web/apps/web/node_modules 2>/dev/null || \
          cp -r node_modules deploy-web/apps/web/node_modules

          # Copy packages
          cp -r packages deploy-web/packages
          cp package.json deploy-web/package.json
          cp pnpm-workspace.yaml deploy-web/pnpm-workspace.yaml

          # List what we have
          echo "=== deploy-web structure ==="
          ls -la deploy-web/
          ls -la deploy-web/apps/web/
          echo "=== next module check ==="
          ls deploy-web/apps/web/node_modules/next/package.json 2>/dev/null && echo "next FOUND" || echo "next NOT FOUND"

          cd deploy-web && zip -r ../web-deploy.zip .
          ls -lh ../web-deploy.zip

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create deployment package
        run: |
          mkdir -p deploy-api/apps
          cp -r apps/api deploy-api/apps/
          cp -r packages deploy-api/
          cp package.json deploy-api/
          cp pnpm-workspace.yaml deploy-api/
          cp pnpm-lock.yaml deploy-api/
          cp -r node_modules deploy-api/

          cat > deploy-api/startup.sh << 'STARTUP'
#!/bin/bash
cd /home/site/wwwroot/apps/api
node_modules/.bin/tsx src/index.ts
STARTUP
          chmod +x deploy-api/startup.sh
          cd deploy-api && zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip
