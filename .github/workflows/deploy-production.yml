name: Deploy to Azure Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'

jobs:
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm --filter @voice-ai/web... build
        env:
          TURBO_FORCE: true
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug build output
        run: |
          echo "=== .next folder ==="
          ls -la apps/web/.next/ || echo "NO .next folder!"
          echo "=== standalone folder ==="
          ls -la apps/web/.next/standalone/ || echo "NO standalone folder!"
          echo "=== server.js check ==="
          ls -la apps/web/.next/standalone/server.js || echo "WARNING: server.js missing!"
          echo "=== next.config output setting ==="
          cat apps/web/next.config.js | grep output

      - name: Create deployment package
        run: |
          if [ ! -f apps/web/.next/standalone/server.js ]; then
            echo "ERROR: standalone/server.js not found!"
            exit 1
          fi
          mkdir -p deploy-web
          cp -r apps/web/.next/standalone/. deploy-web/
          mkdir -p deploy-web/.next/static
          cp -r apps/web/.next/static/. deploy-web/.next/static/
          if [ -d apps/web/public ]; then
            cp -r apps/web/public/. deploy-web/public/
          fi
          echo "=== deploy-web contents ==="
          ls -la deploy-web/
          cd deploy-web
          zip -r ../web-deploy.zip .
          echo "=== zip size ==="
          ls -lh ../web-deploy.zip

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create deployment package
        run: |
          mkdir -p deploy-api/apps
          cp -r apps/api deploy-api/apps/
          cp -r packages deploy-api/
          cp package.json deploy-api/
          cp pnpm-workspace.yaml deploy-api/
          cp pnpm-lock.yaml deploy-api/
          cp -r node_modules deploy-api/
          printf '#!/bin/bash\ncd /home/site/wwwroot/apps/api\nnode_modules/.bin/tsx src/index.ts\n' > deploy-api/startup.sh
          chmod +x deploy-api/startup.sh
          cd deploy-api
          zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip
