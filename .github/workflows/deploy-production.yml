name: Deploy to Azure Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Deploy API (apps/api)
  # ─────────────────────────────────────────
  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build API
        run: pnpm --filter @voice-ai/api build

      - name: Create deployment package (API)
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist deploy-api/
          cp apps/api/package.json deploy-api/
          cp -r packages/database/prisma deploy-api/prisma
          cd deploy-api && zip -r ../api-deploy.zip .

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./api-deploy.zip

  # ─────────────────────────────────────────
  # JOB 2: Build & Deploy Web (apps/web)
  # ─────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web (Next.js)
        run: pnpm --filter @voice-ai/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Create deployment package (Web)
        run: |
          mkdir -p deploy-web
          cp -r apps/web/.next deploy-web/
          cp -r apps/web/public deploy-web/ 2>/dev/null || true
          cp apps/web/package.json deploy-web/
          cp apps/web/next.config.js deploy-web/ 2>/dev/null || true
          cp apps/web/next.config.ts deploy-web/ 2>/dev/null || true
          # Startup script for Azure
          echo "node_modules/.bin/next start" > deploy-web/startup.sh
          cd deploy-web && zip -r ../web-deploy.zip .

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_WEB_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: ./web-deploy.zip

  # ─────────────────────────────────────────
  # JOB 3: Run DB Migrations (after API deploy)
  # ─────────────────────────────────────────
  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
