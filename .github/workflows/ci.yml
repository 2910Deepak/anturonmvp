name: CI - Build & Deploy to Azure Container Apps
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: myRegistryName.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: myRegistryName.azurecr.io/myapp:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/cli-action@v3
        with:
          inlineScript: |
            az login --service-principal -u ${{ secrets.AZ_APP_ID }} -p ${{ secrets.AZ_PASSWORD }} --tenant ${{ secrets.AZ_TENANT }}
            az acr login -n myRegistryName
            az containerapp update -n myApp -g myRG \
              --image myRegistryName.azurecr.io/myapp:${{ github.sha }} \
              --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }} REDIS_URL=${{ secrets.REDIS_URL }} OTHER_SECRET=${{ secrets.OTHER_SECRET }}
